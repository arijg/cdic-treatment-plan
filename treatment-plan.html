<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDIC Treatment Plan</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #eef1f6;
  color: #222;
  min-height: 100vh;
}

/* ── Layout ── */
.app { max-width: 860px; margin: 0 auto; padding: 24px 16px 48px; }

.step { display: none; }
.step.active { display: block; }

/* ── Step indicator ── */
.steps-bar {
  display: flex;
  margin-bottom: 24px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}
.step-pill {
  flex: 1;
  padding: 13px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  background: #dde3ed;
  color: #7a8499;
  transition: background .2s, color .2s;
  cursor: default;
  user-select: none;
}
.step-pill.done   { background: #c2d5ee; color: #2a5fa5; }
.step-pill.active { background: #1d4e99; color: #fff; }

/* ── Card ── */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 32px 36px;
  box-shadow: 0 2px 12px rgba(0,0,0,.09);
}
.card-title { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 28px; }

/* ── Form ── */
.form-row { display: grid; gap: 18px; margin-bottom: 18px; }
.form-row.cols-2 { grid-template-columns: 1fr 1fr; }
.form-row.cols-3 { grid-template-columns: 2fr 1fr 1fr; }
.form-row.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.form-group { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 13px; font-weight: 600; color: #555; }

input[type=text], input[type=number], input[type=date], input[type=tel], input[type=email], select, textarea {
  padding: 9px 13px;
  border: 1.5px solid #d1d9e6;
  border-radius: 7px;
  font-size: 14px;
  font-family: inherit;
  background: #fff;
  color: #111;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: #1d4e99; }
input[readonly] { background: #f4f6fa; color: #555; cursor: default; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 22px;
  border: none;
  border-radius: 7px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, background .15s;
  white-space: nowrap;
}
.btn:hover { opacity: .88; }
.btn-primary   { background: #1d4e99; color: #fff; }
.btn-secondary { background: #e4e8f0; color: #333; }
.btn-danger    { background: #dc3545; color: #fff; padding: 6px 12px; font-size: 12px; }
.btn-print     { background: #1d4e99; color: #fff; }
.btn-ghl       { background: #117077; color: #fff; }

.actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* ── Autocomplete ── */
.ac-wrap { position: relative; }
.ac-list {
  display: none;
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: #fff;
  border: 1.5px solid #1d4e99;
  border-top: none;
  border-radius: 0 0 7px 7px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 200;
  box-shadow: 0 6px 18px rgba(0,0,0,.12);
}
.ac-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 13.5px;
  border-bottom: 1px solid #f0f2f7;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: #eef4ff; }
.ac-price { color: #1d4e99; font-weight: 700; font-size: 13px; }

/* ── Procedure add box ── */
.add-box {
  background: #f7f9fc;
  border: 1.5px solid #dde3ed;
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 24px;
}
.add-box-title { font-size: 14px; font-weight: 700; color: #444; margin-bottom: 14px; }

.calc-hint {
  background: #ebf2ff;
  border: 1px solid #b8cff0;
  border-radius: 6px;
  padding: 9px 14px;
  font-size: 13px;
  color: #1d4e99;
  font-weight: 600;
  margin-top: 10px;
  display: none;
}

/* ── Arch toggle (shown when no tooth numbers) ── */
.arch-toggle {
  display: none;
  gap: 10px;
  margin-top: 4px;
}
.arch-toggle label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-weight: 500;
  font-size: 13px;
  cursor: pointer;
  color: #333;
}
.arch-toggle.visible { display: flex; }

/* ── Procedures table ── */
.proc-list { margin-top: 4px; }
.proc-item { cursor: default; transition: opacity .15s, box-shadow .15s; }
.proc-item.dragging { opacity: .4; }
.proc-item.drag-over { box-shadow: 0 0 0 2px #1d4e99; background: #eef4ff; }
.drag-handle {
  color: #bbb;
  cursor: grab;
  font-size: 16px;
  padding: 0 4px;
  user-select: none;
  flex-shrink: 0;
}
.drag-handle:active { cursor: grabbing; }
.price-input {
  width: 90px;
  padding: 4px 8px;
  border: 1.5px solid #d1d9e6;
  border-radius: 5px;
  font-size: 13.5px;
  font-family: inherit;
  color: #111;
  background: #fff;
  text-align: right;
}
.price-input:focus {
  border-color: #1d4e99;
  outline: none;
  background: #f0f6ff;
}
.proc-list-header {
  display: grid;
  grid-template-columns: 20px 2.5fr 1.2fr .7fr 1fr 1fr auto;
  gap: 8px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #888;
  letter-spacing: .5px;
}
.proc-item {
  display: grid;
  grid-template-columns: 20px 2.5fr 1.2fr .7fr 1fr 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 11px 14px;
  background: #fff;
  border: 1.5px solid #e4e8f0;
  border-radius: 8px;
  margin-bottom: 7px;
  font-size: 13.5px;
}
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  margin-left: 5px;
  vertical-align: middle;
}
.badge-upper { background: #dbeafe; color: #1e40af; }
.badge-lower { background: #fef3c7; color: #92400e; }
.badge-mixed { background: #d1fae5; color: #065f46; }

.empty-msg {
  text-align: center;
  padding: 28px;
  color: #aaa;
  font-size: 14px;
  border: 2px dashed #dde3ed;
  border-radius: 8px;
}

/* ── Live subtotal bar ── */
.subtotal-bar {
  background: #1d4e99;
  color: #fff;
  border-radius: 10px;
  padding: 16px 22px;
  margin-top: 20px;
  display: none;
}
.subtotal-bar.visible { display: block; }
.subtotal-bar-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  opacity: .75;
  margin-bottom: 10px;
}
.subtotal-rows { display: flex; flex-wrap: wrap; gap: 8px 24px; align-items: flex-end; }
.subtotal-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.subtotal-item-label { font-size: 11px; opacity: .75; font-weight: 600; }
.subtotal-item-value { font-size: 15px; font-weight: 700; }
.subtotal-item.grand .subtotal-item-label { opacity: 1; font-size: 12px; }
.subtotal-item.grand .subtotal-item-value { font-size: 20px; }
.subtotal-divider { width: 1px; background: rgba(255,255,255,.3); align-self: stretch; margin: 0 4px; }

/* ── Tooth picker ── */
.tooth-picker {
  margin-top: 4px;
}
.tooth-arch-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.tooth-arch-tag {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: #888;
  letter-spacing: .5px;
  min-width: 38px;
  flex-shrink: 0;
}
.tooth-grid {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 3px;
  flex: 1;
}
.tooth-btn {
  aspect-ratio: 1;
  border: 1.5px solid #d1d9e6;
  border-radius: 5px;
  background: #fff;
  font-size: 11px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  transition: background .12s, border-color .12s, color .12s;
  padding: 0;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.tooth-btn:hover  { border-color: #1d4e99; color: #1d4e99; background: #eef4ff; }
.tooth-btn.selected { background: #1d4e99; border-color: #1d4e99; color: #fff; }
.tooth-sel-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  min-height: 24px;
}
.tooth-sel-text {
  font-size: 12px;
  color: #555;
  flex: 1;
}
.tooth-sel-text.has-teeth { color: #1d4e99; font-weight: 600; }
.btn-clear-teeth {
  background: none;
  border: none;
  color: #dc3545;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  display: none;
  flex-shrink: 0;
}
.btn-clear-teeth:hover { background: #fff0f0; }

@media screen and (max-width: 600px) {
  .tooth-grid { grid-template-columns: repeat(8, 1fr); gap: 2px; }
  .tooth-arch-row { flex-direction: column; align-items: flex-start; gap: 3px; }
  .tooth-arch-tag { min-width: unset; }
  .tooth-btn { font-size: 12px; }
}

/* ── Discount list ── */
.discount-input-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 12px; align-items: flex-end; margin-bottom: 12px; }
.discount-item {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 9px 14px;
  background: #fff;
  border: 1.5px solid #e4e8f0;
  border-radius: 8px;
  margin-bottom: 7px;
  font-size: 13.5px;
}
.discount-item-header {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr auto;
  gap: 8px;
  padding: 4px 14px 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #888;
  letter-spacing: .5px;
}
.discount-amt { color: #c0392b; font-weight: 700; }

/* ── Optional discount section ── */
.optional-section {
  border-top: 1px solid #eee;
  margin-top: 20px;
  padding-top: 16px;
}
.optional-label {
  font-size: 13px;
  font-weight: 600;
  color: #888;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.optional-label::before {
  content: '▸';
  transition: transform .15s;
  font-size: 11px;
}
.optional-label.open::before { transform: rotate(90deg); }
.optional-body { display: none; }
.optional-body.open { display: block; }


/* ════════════════════════════════════════════
   PRINT / TREATMENT PLAN STYLES
   ════════════════════════════════════════════ */

.tp-wrap {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.09);
  overflow: hidden;
}

.tp {
  font-family: Arial, Helvetica, sans-serif;
  padding: 0 12px 32px;
  color: #111;
}

.tp-header { text-align: center; margin-bottom: 6px; }
.tp-co-name {
  line-height: 1;
}
.tp-address  { font-size: 11px; margin-top: 3px; }
.tp-dr-line  { font-size: 11px; margin-top: 2px; }

.tp-est-title {
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  text-decoration: underline;
  margin: 14px 0 10px;
}

.tp-patient-row {
  display: flex;
  justify-content: space-between;
  font-size: 11.5px;
  margin-bottom: 10px;
}

/* Table */
.tp-tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.tp-tbl thead tr th {
  background: #117077;
  color: #fff;
  padding: 7px 8px;
  font-size: 10.5px;
  font-weight: 700;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.tp-tbl td { padding: 5px 8px; }
.tp-tbl tbody tr:not(.arch-row):not(.sub-row):not(.total-row) {
  border-bottom: 1px solid #e8e8e8;
}

/* Section header row */
.arch-row td {
  font-weight: 700;
  font-size: 11.5px;
  background: #f2f4f8;
  padding: 6px 8px;
  border-top: 2px solid #444;
}

/* Subtotal row */
.sub-row td {
  font-weight: 700;
  background: #fafafa;
  padding: 6px 8px;
  border-top: 1px solid #ccc;
}

/* Section total row */
.total-row td {
  font-weight: 700;
  font-size: 11.5px;
  padding: 6px 8px;
  border-top: 1.5px solid #888;
  background: #f7f7f7;
}

.r { text-align: right; }
.c { text-align: center; }

/* Summary block */
.tp-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-top: 14px;
  gap: 16px;
}
.tp-summary { display: flex; justify-content: flex-end; flex-shrink: 0; }
.tp-summary-inner { font-size: 11.5px; min-width: 340px; }
.tp-sum-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid #eee;
}
.tp-sum-row:last-child { border-bottom: none; }
.tp-sum-row.grand {
  font-size: 13px;
  font-weight: 700;
  padding-top: 8px;
  border-top: 2px solid #333;
  border-bottom: none;
}
.tp-sum-row.discount { color: #c0392b; }
.tp-sum-label { padding-right: 20px; }
.tp-sum-amt { font-weight: 600; text-align: right; min-width: 90px; }

.tp-fine-print { font-size: 9.5px; color: #555; line-height: 1.6; max-width: 44%; align-self: center; }
.tp-sig { font-size: 11px; margin-top: 36px; }

/* ── Print ── */
@media print {
  body { background: #fff; margin: 0; padding: 0; }
  .no-print { display: none !important; }
  .tp-wrap { box-shadow: none; border-radius: 0; overflow-x: visible !important; overflow-y: visible !important; }
  .tp { padding: 0 0.1in 0.3in !important; }
  .tp-tbl { min-width: unset !important; width: 100% !important; }
  @page { margin: 0.1in 0.4in 0.4in; }
}

@media screen and (max-width: 600px) {
  /* Step 2: stack procedure input fields vertically */
  .form-row.cols-3,
  .form-row.cols-2,
  .discount-input-row {
    grid-template-columns: 1fr !important;
  }
  .discount-input-row .btn {
    width: 100%;
    justify-content: center;
  }

  /* Step 3: make table scroll horizontally on screen only (print unaffected) */
  .tp { padding: 0 16px 24px; }
  .tp-wrap { overflow-x: auto; }
  .tp-tbl { min-width: 520px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Step indicator -->
  <div class="steps-bar no-print">
    <div class="step-pill active" id="pill-1">1 &nbsp;·&nbsp; Patient Info</div>
    <div class="step-pill"        id="pill-2">2 &nbsp;·&nbsp; Procedures</div>
    <div class="step-pill"        id="pill-3">3 &nbsp;·&nbsp; Treatment Plan</div>
  </div>

  <!-- ══════════════════════════════════════
       STEP 1 – Patient Info
  ══════════════════════════════════════ -->
  <div class="step active" id="step-1">
    <div class="card">
      <div class="card-title">Patient Information</div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="patientFirstName" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="patientLastName" placeholder="Last name">
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="patientPhone" placeholder="(212) 555-0100">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="patientEmail" placeholder="email@example.com">
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label>Doctor</label>
          <select id="doctor">
            <option value="">Select doctor…</option>
            <option>Dr. Hedieh Samadi</option>
            <option>Dr. Robert Horowitz</option>
            <option selected>Dr. Dale Goldschlag</option>
          </select>
        </div>
        <div class="form-group">
          <label>Treatment Coordinator</label>
          <select id="coordinator">
            <option value="">Select coordinator…</option>
            <option selected>Jackie</option>
            <option>Yaya</option>
            <option>ViolaNile</option>
            <option>Rodrigo</option>
            <option>Meg</option>
            <option>Essy</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Location</label>
          <select id="location">
            <option value="">Select location…</option>
            <option value="120 Central Park South 1G  •  New York, NY 10019  •  Tel: (212) 262-0950" selected>120 Central Park South 1G — New York, NY 10019 — Tel: (212) 262-0950</option>
            <option value="2 Overhill Rd Suite 270  •  Scarsdale, NY 10583  •  Tel: (914) 358-4183">2 Overhill Rd Suite 270 — Scarsdale, NY 10583 — Tel: (212) 269-9500</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="step1Next()">Next →</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════
       STEP 2 – Procedures
  ══════════════════════════════════════ -->
  <div class="step" id="step-2">
    <div class="card">
      <div class="card-title">Add Procedures</div>

      <!-- Add procedure box -->
      <div class="add-box">
        <div class="add-box-title">New Procedure</div>

        <div class="form-row cols-3">
          <!-- Treatment autocomplete -->
          <div class="form-group ac-wrap">
            <label>Treatment</label>
            <input type="text" id="txInput" placeholder="Type to search…"
                   oninput="acFilter()" autocomplete="off">
            <div class="ac-list" id="acList"></div>
          </div>

          <div class="form-group">
            <label>Price per Unit ($)</label>
            <input type="number" id="priceInput" placeholder="0.00" step="5" min="0"
                   oninput="updateCalc()">
          </div>

        </div>

        <!-- Tooth picker -->
        <div class="form-group" style="margin-top:4px">
          <label>Tooth Numbers</label>
          <div class="tooth-picker">
            <div class="tooth-arch-row">
              <span class="tooth-arch-tag">Upper</span>
              <div class="tooth-grid" id="upperTeethGrid"></div>
            </div>
            <div class="tooth-arch-row">
              <span class="tooth-arch-tag">Lower</span>
              <div class="tooth-grid" id="lowerTeethGrid"></div>
            </div>
            <div class="tooth-sel-row">
              <span class="tooth-sel-text" id="toothSelText">No teeth selected</span>
              <button type="button" class="btn-clear-teeth" id="clearTeethBtn" onclick="clearTeeth()">Clear All</button>
            </div>
          </div>
          <input type="hidden" id="teethInput">
        </div>

        <div class="calc-hint" id="calcHint"></div>

        <div class="actions" style="margin-top:14px">
          <button class="btn btn-primary" onclick="addProcedure()">+ Add to Plan</button>
        </div>
      </div>

      <!-- Procedures list -->
      <div id="procListWrap">
        <div class="empty-msg" id="emptyMsg">No procedures added yet.</div>
      </div>

      <!-- Live subtotal -->
      <div class="subtotal-bar" id="subtotalBar">
        <div class="subtotal-bar-title">Running Totals</div>
        <div class="subtotal-rows" id="subtotalRows"></div>
      </div>

      <!-- Optional discounts -->
      <div class="optional-section">
        <div class="optional-label" onclick="toggleOptional(this)">Discounts (Optional)</div>
        <div class="optional-body">
          <div class="discount-input-row">
            <div class="form-group ac-wrap">
              <label>Discount Name</label>
              <input type="text" id="discountName" placeholder="Type or select…"
                     oninput="acDiscountFilter()" onfocus="acDiscountFilter()" autocomplete="off">
              <div class="ac-list" id="acDiscountList"></div>
            </div>
            <div class="form-group">
              <label>Discount %</label>
              <input type="number" id="discountPct" placeholder="e.g. 10" min="0" max="100" step="1" value="5">
            </div>
            <button class="btn btn-primary" onclick="addDiscount()" style="margin-bottom:1px">+ Add</button>
          </div>
          <div id="discountListWrap"></div>
          <div class="form-group" style="margin-top:12px; max-width:220px;">
            <label>Valid Through</label>
            <input type="date" id="discountDate">
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" onclick="goStep(1)">← Back</button>
        <button class="btn btn-primary"   onclick="step2Next()">Preview Plan →</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════
       STEP 3 – Treatment Plan
  ══════════════════════════════════════ -->
  <div class="step" id="step-3">

      <button class="btn btn-secondary" onclick="goStep(2)">← Back</button>
      <button class="btn btn-ghl"       onclick="sendToGHL(this)">GHL</button>
      <button class="btn btn-print"     onclick="window.print()">🖨 Print</button>
    </div>
    <div class="tp-wrap">
      <div class="tp" id="tpOutput"></div>
    </div>
  </div>

</div><!-- /app -->


<script>
// ── Set discount date default to end of current month ────────────────
(function() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  const yyyy = lastDay.getFullYear();
  const mm   = String(lastDay.getMonth() + 1).padStart(2, '0');
  const dd   = String(lastDay.getDate()).padStart(2, '0');
  document.getElementById('discountDate').value = `${yyyy}-${mm}-${dd}`;
})();

// ── Treatment data from Feeders sheet ──────────────────────────────────
const TREATMENTS = [
  { name: "Surgical Extractions",                  price: 895   },
  { name: "Bone Graft",                             price: 785   },
  { name: "Ozone Therapy Post Extraction",          price: 285   },
  { name: "Surgical Temporary Per Unit",            price: 550   },
  { name: "Internal Sinus Lift With PRF & PRP",     price: 2500  },
  { name: "Titanium Implant Abutment",              price: 785   },
  { name: "PRF & PRP",                              price: 685   },
  { name: "Zirconia Abutment Customization",        price: 785   },
  { name: "Zirconia/Metal Free/Ceramic Crowns",     price: 2895  },
  { name: "Titanium Implant Abutment & Crown",      price: 3895  },
  { name: "Section Crown",                          price: 485   },
  { name: "Zirconia / Metal Free / Ceramic Implant",price: 3000  },
  { name: "Zirconia/Ceramic Implant Post & Crown",  price: 5895  },
  { name: "Internal Sinus Lift",                    price: 1250  },
  { name: "Fully Guided Implant Surgical Stent",    price: 250   },
  { name: "Vitamin C",                              price: 240   },
  { name: "Surgical Implant Extraction",            price: 785   },
  { name: "Prosthetic Temporary Per Unit",          price: 555   },
  { name: "Full Arch Reconstruction",               price: 18900 },
];

// ── Discount presets ──────────────────────────────────────────────────
const DISCOUNT_PRESETS = [
  "$18,900 Special",
  "Senior Citizen Discount",
  "Military Appreciation Discount",
  "Spring Renewal Special",
  "Shine All Summer",
  "The Fall Confidence Special",
  "New Year, New Smile",
];
const FIXED_PRICE_PRESETS = { "$18,900 Special": 18900 };
const XRAY_SUBTOTAL = 250;

// Returns an array of dollar amounts, one per discount, respecting order:
// pct discounts apply to `total`; fixed-price discounts apply to what remains after prior discounts.
function computeDiscountAmounts(total, discountList) {
  const pctTotal = discountList
    .filter(d => d.fixedPrice === undefined)
    .reduce((s, d) => s + total * (d.pct / 100), 0);
  const afterPct = total - pctTotal;
  return discountList.map(d =>
    d.fixedPrice !== undefined
      ? Math.max(0, afterPct - d.fixedPrice)
      : total * (d.pct / 100)
  );
}

// ── State ──────────────────────────────────────────────────────────────
let procedures = [];
let discounts  = [];

// ── Helpers ───────────────────────────────────────────────────────────
function fmt(n) {
  return '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function parseTeeth(str) {
  if (!str || !str.trim()) return [];
  return str.split(',')
    .map(s => s.trim())
    .filter(s => /^\d+$/.test(s))
    .map(Number);
}

function getSection(teethStr) {
  const nums = parseTeeth(teethStr);
  if (!nums.length) return null; // no valid numbers → manual
  const hasUpper = nums.some(n => n >= 1  && n <= 16);
  const hasLower = nums.some(n => n >= 17 && n <= 36);
  if (hasUpper && !hasLower) return 'upper';
  if (hasLower && !hasUpper) return 'lower';
  return 'mixed'; // spans both
}

function currentUnits() {
  return parseTeeth(document.getElementById('teethInput').value).length || 0;
}

// ── Tooth picker ──────────────────────────────────────────────────────
const toothSel = new Set();

function buildToothGrids() {
  const upper = document.getElementById('upperTeethGrid');
  const lower = document.getElementById('lowerTeethGrid');
  upper.innerHTML = Array.from({length:16}, (_,i) => i+1).map(n =>
    `<button type="button" class="tooth-btn" data-tooth="${n}" onclick="toggleTooth(${n})">${n}</button>`
  ).join('');
  lower.innerHTML = Array.from({length:16}, (_,i) => 32-i).map(n =>
    `<button type="button" class="tooth-btn" data-tooth="${n}" onclick="toggleTooth(${n})">${n}</button>`
  ).join('');
}

function toggleTooth(n) {
  if (toothSel.has(n)) toothSel.delete(n);
  else toothSel.add(n);
  syncTeethInput();
}

function clearTeeth() {
  toothSel.clear();
  syncTeethInput();
}

function syncTeethInput() {
  const sorted = [...toothSel].sort((a,b) => a-b);
  document.getElementById('teethInput').value = sorted.join(', ');
  // Update button visuals
  document.querySelectorAll('.tooth-btn').forEach(btn => {
    btn.classList.toggle('selected', toothSel.has(+btn.dataset.tooth));
  });
  // Update selection text
  const txt = document.getElementById('toothSelText');
  const clr = document.getElementById('clearTeethBtn');
  if (sorted.length === 0) {
    txt.textContent = 'No teeth selected';
    txt.classList.remove('has-teeth');
    clr.style.display = 'none';
  } else {
    txt.textContent = `${sorted.length} tooth${sorted.length !== 1 ? 's' : ''} selected: ${sorted.join(', ')}`;
    txt.classList.add('has-teeth');
    clr.style.display = 'inline-block';
  }
  onTeethInput();
}

// Build grids on load
document.addEventListener('DOMContentLoaded', buildToothGrids);

// ── Autocomplete ───────────────────────────────────────────────────────
function acFilter() {
  const val = document.getElementById('txInput').value.toLowerCase().trim();
  const list = document.getElementById('acList');
  if (!val) { list.style.display = 'none'; return; }
  const matches = TREATMENTS.filter(t => t.name.toLowerCase().includes(val));
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map(t =>
    `<div class="ac-item" onmousedown="selectTx(event,'${t.name.replace(/'/g,"\\'")}',${t.price})">
       <span>${highlight(t.name, val)}</span>
       <span class="ac-price">${fmt(t.price)}</span>
     </div>`
  ).join('');
  list.style.display = 'block';
}

function highlight(text, term) {
  const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<strong>$1</strong>');
}

function selectTx(e, name, price) {
  e.preventDefault();
  document.getElementById('txInput').value = name;
  document.getElementById('priceInput').value = price;
  document.getElementById('acList').style.display = 'none';
  updateCalc();
  document.getElementById('teethInput').focus();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap')) {
    document.getElementById('acList').style.display = 'none';
    document.getElementById('acDiscountList').style.display = 'none';
  }
});

// ── Teeth input handler ────────────────────────────────────────────────
function onTeethInput() {
  updateCalc();
}

// ── Calc hint ─────────────────────────────────────────────────────────
function updateCalc() {
  const price = parseFloat(document.getElementById('priceInput').value) || 0;
  const units = currentUnits();
  const hint  = document.getElementById('calcHint');
  if (price > 0 && units > 0) {
    hint.textContent = `${units} unit${units !== 1 ? 's' : ''} × ${fmt(price)} = ${fmt(price * units)}`;
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
}

// ── Add procedure ──────────────────────────────────────────────────────
function addProcedure() {
  const name  = document.getElementById('txInput').value.trim();
  const price = parseFloat(document.getElementById('priceInput').value);
  const teeth = document.getElementById('teethInput').value.trim();

  if (!name)          { alert('Please enter a treatment name.'); return; }
  if (!price || price <= 0) { alert('Please enter a valid price.'); return; }
  if (!teeth)         { alert('Please enter tooth numbers.'); return; }

  const nums    = parseTeeth(teeth);
  if (!nums.length) { alert('Please select at least one tooth number.'); return; }
  const section = getSection(teeth);
  const units   = nums.length;

  if (section === 'mixed') {
    const upperTeeth = nums.filter(n => n >= 1  && n <= 16);
    const lowerTeeth = nums.filter(n => n >= 17 && n <= 36);
    if (upperTeeth.length)
      procedures.push({ name, price, teeth: upperTeeth.join(', '), units: upperTeeth.length, section: 'upper', total: price * upperTeeth.length });
    if (lowerTeeth.length)
      procedures.push({ name, price, teeth: lowerTeeth.join(', '), units: lowerTeeth.length, section: 'lower', total: price * lowerTeeth.length });
  } else {
    procedures.push({ name, price, teeth, units, section, total: price * units });
  }

  // Reset inputs
  document.getElementById('txInput').value    = '';
  document.getElementById('priceInput').value = '';
  clearTeeth();
  document.getElementById('calcHint').style.display  = 'none';

  renderProcList();
  renderSubtotal();
}

// ── Discount autocomplete ─────────────────────────────────────────────
function acDiscountFilter() {
  const val  = document.getElementById('discountName').value.toLowerCase().trim();
  const list = document.getElementById('acDiscountList');
  const matches = val
    ? DISCOUNT_PRESETS.filter(d => d.toLowerCase().includes(val))
    : DISCOUNT_PRESETS;
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map(d =>
    `<div class="ac-item" onmousedown="selectDiscount(event,'${d.replace(/'/g,"\'")}')">${val ? highlight(d, val) : d}</div>`
  ).join('');
  list.style.display = 'block';
}

function selectDiscount(e, name) {
  e.preventDefault();
  document.getElementById('discountName').value = name;
  document.getElementById('acDiscountList').style.display = 'none';
  const pctEl = document.getElementById('discountPct');
  if (FIXED_PRICE_PRESETS[name] !== undefined) {
    pctEl.value = '';
    pctEl.placeholder = 'N/A';
    pctEl.disabled = true;
  } else {
    pctEl.disabled = false;
    pctEl.placeholder = 'e.g. 10';
    pctEl.focus();
  }
}

// ── Discounts ────────────────────────────────────────────────────────
function addDiscount() {
  const name  = document.getElementById('discountName').value.trim();
  const pctEl = document.getElementById('discountPct');
  if (!name) { alert('Please enter a discount name.'); return; }
  if (FIXED_PRICE_PRESETS[name] !== undefined) {
    discounts.push({ name, fixedPrice: FIXED_PRICE_PRESETS[name] });
  } else {
    const pct = parseFloat(pctEl.value);
    if (!pct || pct <= 0) { alert('Please enter a valid discount percentage.'); return; }
    discounts.push({ name, pct });
  }
  document.getElementById('discountName').value = '';
  pctEl.value = '5';
  pctEl.placeholder = 'e.g. 10';
  pctEl.disabled = false;
  renderDiscountList();
  renderSubtotal();
}

function removeDiscount(i) {
  discounts.splice(i, 1);
  renderDiscountList();
  renderSubtotal();
}

function renderDiscountList() {
  const wrap = document.getElementById('discountListWrap');
  if (!discounts.length) { wrap.innerHTML = ''; return; }
  const upper = procedures.filter(p => p.section === 'upper');
  const lower = procedures.filter(p => p.section === 'lower' || p.section === 'mixed');
  const caseTotal = upper.reduce((s,p) => s+p.total, 0) + lower.reduce((s,p) => s+p.total, 0);
  wrap.innerHTML = `
    <div class="discount-item-header">
      <span>Name</span><span>%</span><span>Amount</span><span></span>
    </div>
    ${computeDiscountAmounts(caseTotal + XRAY_SUBTOTAL, discounts).map((amt, i) => {
      const d     = discounts[i];
      const label = d.fixedPrice !== undefined ? `$${d.fixedPrice.toLocaleString()} target` : `${d.pct}%`;
      return `<div class="discount-item">
        <span>${d.name}</span>
        <span>${label}</span>
        <span class="discount-amt">-${fmt(amt)}</span>
        <button class="btn btn-danger" onclick="removeDiscount(${i})">✕</button>
      </div>`;
    }).join('')}`;
}

// ── Live subtotal ─────────────────────────────────────────────────────
function renderSubtotal() {
  const bar  = document.getElementById('subtotalBar');
  const rows = document.getElementById('subtotalRows');

  if (!procedures.length) { bar.classList.remove('visible'); return; }

  const upper      = procedures.filter(p => p.section === 'upper');
  const lower      = procedures.filter(p => p.section === 'lower' || p.section === 'mixed');
  const upperTotal = upper.reduce((s, p) => s + p.total, 0);
  const lowerTotal = lower.reduce((s, p) => s + p.total, 0);
  const grandTotal = upperTotal + lowerTotal;

  const effectiveTotal    = grandTotal + XRAY_SUBTOTAL;
  const discountAmts      = computeDiscountAmounts(effectiveTotal, discounts);
  const totalDiscountAmt  = discountAmts.reduce((s, a) => s + a, 0);
  const finalTotal        = grandTotal - totalDiscountAmt;

  let html = '';
  if (upper.length) {
    html += `<div class="subtotal-item"><span class="subtotal-item-label">Upper</span><span class="subtotal-item-value">${fmt(upperTotal)}</span></div>`;
  }
  if (lower.length) {
    if (upper.length) html += `<div class="subtotal-divider"></div>`;
    html += `<div class="subtotal-item"><span class="subtotal-item-label">Lower</span><span class="subtotal-item-value">${fmt(lowerTotal)}</span></div>`;
  }
  html += `<div class="subtotal-divider"></div>`;
  html += `<div class="subtotal-item grand"><span class="subtotal-item-label">Total Complete Case</span><span class="subtotal-item-value">${fmt(grandTotal)}</span></div>`;
  if (discounts.length) {
    discounts.forEach((d, i) => {
      const amt   = discountAmts[i];
      const label = d.fixedPrice !== undefined ? d.name : `${d.name} ${d.pct}%`;
      html += `<div class="subtotal-divider"></div><div class="subtotal-item"><span class="subtotal-item-label" style="color:rgba(255,255,255,.8)">${label}</span><span class="subtotal-item-value" style="color:#fca5a5">-${fmt(amt)}</span></div>`;
    });
    html += `<div class="subtotal-divider"></div>`;
    html += `<div class="subtotal-item grand"><span class="subtotal-item-label">Subtotal</span><span class="subtotal-item-value">${fmt(finalTotal)}</span></div>`;
  }

  rows.innerHTML = html;
  bar.classList.add('visible');
}

// ── Remove procedure ───────────────────────────────────────────────────
function removeProcedure(i) {
  procedures.splice(i, 1);
  renderProcList();
  renderSubtotal();
}

// ── Inline price edit ────────────────────────────────────────────────
function updateProcPrice(i, val) {
  const newPrice = parseFloat(val);
  if (isNaN(newPrice) || newPrice < 0) return;
  procedures[i].price = newPrice;
  procedures[i].total = newPrice * procedures[i].units;
  const totalEl = document.getElementById('proc-total-' + i);
  if (totalEl) totalEl.textContent = fmt(procedures[i].total);
  renderSubtotal();
}

// ── Drag and drop ────────────────────────────────────────────────────
let dragSrcIdx = null;

function onDragStart(e, i) {
  dragSrcIdx = i;
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onDragOver(e, i) {
  e.preventDefault();
  document.querySelectorAll('.proc-item').forEach((el, idx) => {
    el.classList.toggle('drag-over', idx === i && i !== dragSrcIdx);
  });
}
function onDrop(e, i) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === i) return;
  const item = procedures.splice(dragSrcIdx, 1)[0];
  procedures.splice(i, 0, item);
  dragSrcIdx = null;
  renderProcList();
  renderSubtotal();
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.proc-item').forEach(el => el.classList.remove('drag-over'));
  dragSrcIdx = null;
}

// ── Render procedures list ─────────────────────────────────────────────
function renderProcList() {
  const wrap = document.getElementById('procListWrap');
  if (!procedures.length) {
    wrap.innerHTML = '<div class="empty-msg" id="emptyMsg">No procedures added yet.</div>';
    return;
  }
  const sLabel = { upper:'Upper', lower:'Lower', mixed:'Both Arches' };
  const sCls   = { upper:'badge-upper', lower:'badge-lower', mixed:'badge-mixed' };
  wrap.innerHTML = `
    <div class="proc-list">
      <div class="proc-list-header">
        <span></span>
        <span>Treatment</span>
        <span>Teeth</span>
        <span>Units</span>
        <span>Price</span>
        <span>Total</span>
        <span></span>
      </div>
      ${procedures.map((p,i) => `
        <div class="proc-item" draggable="true"
             ondragstart="onDragStart(event,${i})"
             ondragover="onDragOver(event,${i})"
             ondrop="onDrop(event,${i})"
             ondragend="onDragEnd(event)">
          <span class="drag-handle">⠿</span>
          <span>${p.name}<span class="badge ${sCls[p.section]}">${sLabel[p.section]}</span></span>
          <span>${p.teeth}</span>
          <span>${p.units}</span>
          <input class="price-input" type="number" value="${p.price}" min="0" step="5"
                 onchange="updateProcPrice(${i}, this.value)"
                 ondragstart="event.stopPropagation()"
                 onclick="event.stopPropagation()">
          <span id="proc-total-${i}">${fmt(p.total)}</span>
          <button class="btn btn-danger" onclick="removeProcedure(${i})">✕</button>
        </div>
      `).join('')}
    </div>`;
}

// ── Navigation ─────────────────────────────────────────────────────────
function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step-' + n).classList.add('active');
  ['pill-1','pill-2','pill-3'].forEach((id, idx) => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if (idx + 1 < n) el.classList.add('done');
    if (idx + 1 === n) el.classList.add('active');
  });
  window.scrollTo(0, 0);
}

function step1Next() {
  const f = {
    patientFirstName: document.getElementById('patientFirstName').value.trim(),
    patientLastName:  document.getElementById('patientLastName').value.trim(),
    location:         document.getElementById('location').value,
    doctor:           document.getElementById('doctor').value,
    coordinator:      document.getElementById('coordinator').value,
  };
  if (!f.patientFirstName || !f.patientLastName || !f.location || !f.doctor || !f.coordinator) {
    alert('Please fill in all required fields.');
    return;
  }
  goStep(2);
}

function step2Next() {
  renderTreatmentPlan();
  goStep(3);
}

// ── Toggle optional section ────────────────────────────────────────────
function toggleOptional(label) {
  label.classList.toggle('open');
  label.nextElementSibling.classList.toggle('open');
}

// ── GoHighLevel webhook ────────────────────────────────────────────────
async function sendToGHL(btn) {
  const firstName   = document.getElementById('patientFirstName').value.trim();
  const lastName    = document.getElementById('patientLastName').value.trim();
  const phone       = document.getElementById('patientPhone').value.trim();
  const email       = document.getElementById('patientEmail').value.trim();
  const doctor      = document.getElementById('doctor').value;
  const coordinator = document.getElementById('coordinator').value;

  const upper      = procedures.filter(p => p.section === 'upper');
  const lower      = procedures.filter(p => p.section === 'lower' || p.section === 'mixed');
  const upperTotal = upper.reduce((s, p) => s + p.total, 0);
  const lowerTotal = lower.reduce((s, p) => s + p.total, 0);
  const caseTotal  = upperTotal + lowerTotal + XRAY_SUBTOTAL;
  const tpDiscountAmts   = computeDiscountAmounts(caseTotal, discounts);
  const totalDiscountAmt = tpDiscountAmts.reduce((s, a) => s + a, 0);
  const subtotal   = caseTotal - totalDiscountAmt;

  const rawDiscountDate    = document.getElementById('discountDate').value;
  const discountExpiration = rawDiscountDate
    ? new Date(rawDiscountDate + 'T00:00:00').toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' })
    : '';

  const orig = btn.textContent;
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch('https://services.leadconnectorhq.com/hooks/ux8dDIVrVFv7Hgye423F/webhook-trigger/570411bc-1fe2-4053-9746-98db19b23303', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        firstName,
        lastName,
        phone,
        email,
        doctor,
        coordinator,
        caseTotal:           parseFloat(caseTotal.toFixed(2)),
        discountAmount:      parseFloat(totalDiscountAmt.toFixed(2)),
        subtotal:            parseFloat(subtotal.toFixed(2)),
        discountExpiration,
      })
    });
    btn.textContent = res.ok ? '✓ Sent' : '✗ Error';
    btn.style.background = res.ok ? '#1a7a4a' : '#c0392b';
  } catch (e) {
    btn.textContent = '✗ Error';
    btn.style.background = '#c0392b';
  }

  setTimeout(() => {
    btn.textContent = orig;
    btn.style.background = '';
    btn.disabled = false;
  }, 3000);
}

// ── Render treatment plan ──────────────────────────────────────────────
function renderTreatmentPlan() {
  const patientName  = (document.getElementById('patientFirstName').value + ' ' + document.getElementById('patientLastName').value).trim();
  const location     = document.getElementById('location').value;
  const doctor       = document.getElementById('doctor').value;
  const coordinator  = document.getElementById('coordinator').value;
  const discountDate = document.getElementById('discountDate').value;

  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  // Partition procedures
  const upper = procedures.filter(p => p.section === 'upper');
  const lower = procedures.filter(p => p.section === 'lower' || p.section === 'mixed');

  const upperTotal = upper.reduce((s, p) => s + p.total, 0);
  const lowerTotal = lower.reduce((s, p) => s + p.total, 0);
  const xraySubtotal = 250;
  const caseTotal    = upperTotal + lowerTotal + xraySubtotal;
  const tpDiscountAmts   = computeDiscountAmounts(caseTotal, discounts);
  const totalDiscountAmt = tpDiscountAmts.reduce((s, a) => s + a, 0);
  const subtotal         = caseTotal - totalDiscountAmt;

  // Build procedure rows
  const procRows = ps => ps.map(p => `
    <tr>
      <td></td>
      <td>${p.name}</td>
      <td>${p.teeth}</td>
      <td class="r">${fmt(p.price)}</td>
      <td class="c">${p.units}</td>
      <td class="r">${fmt(p.total)}</td>
    </tr>`).join('');

  const upperSection = upper.length ? `
    <tr class="arch-row"><td colspan="6">Upper</td></tr>
    ${procRows(upper)}
    <tr class="total-row">
      <td colspan="1"></td>
      <td colspan="4" class="r" style="font-weight:700">Total Upper Case:</td>
      <td class="r">${fmt(upperTotal)}</td>
    </tr>` : '';

  const lowerSection = lower.length ? `
    <tr class="arch-row"><td colspan="6">Lower</td></tr>
    ${procRows(lower)}
    <tr class="total-row">
      <td colspan="1"></td>
      <td colspan="4" class="r" style="font-weight:700">Total Lower Case:</td>
      <td class="r">${fmt(lowerTotal)}</td>
    </tr>` : '';

  const formattedDiscountDate = (discountDate && discounts.length > 0)
